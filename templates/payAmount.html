{% include 'clientHead.html' %}
<div class="container">
    <div class="row">
        <div class="col-md-4"></div>
        <div class="col-md-4">
        <div class=" card mt-4 p-3" style="border-radius: 50px 20px;box-shadow: 5px 10px #888888;" >
            <form action="payAmount1" method="post">
                <div class="text-center h4">Payment</div>
                <input type="hidden" name="project_id" value="{{project_id}}">
                <input type="hidden" name="developer_id" value="{{developer_id}}">
                 <input type="hidden" name="amount" value="{{amount}}">
                <div class="mt-1">
                    <label class="form-label"><b>Amount: $ {{amount}}</b></label>
                    <input type="number" min="1" disabled name="amount" value="{{amount}}" class="form-control">
                </div>
                     <div class="mt-1">
                        <label for="card_number" class="form-label">Card Number</label>
                        <input type="number" min="1" name="card_number" id="card_number" placeholder="Enter Number" required class="form-control">
                   </div>
                   <div class="mt-1">
                    <label for="holder_name" class="form-label">Holder Name</label>
                    <input type="text" name="holder_name" id="holder_name" placeholder="Enter Name" required class="form-control">
                  </div>
                      <div class="mt-1">
                        <label for="cvv" class="form-label">CVV</label>
                        <input type="number" min="0" name="cvv" id="cvv" placeholder="Enter CVV" required class="form-control">
                   </div>
                     <div class="mt-1">
                        <label for="expiry_date" class="form-label">Expiry Date</label>
                        <input type="text" name="expiry_date" id="expiry_date" placeholder="Enter Date" required class="form-control">
                  </div>
                <div class="row">
                    <div class="col-md-3"></div>
                    <div class="col-md-6">
                        <div class="mt-3">
                            <input type="submit" value="Pay Amount" class="btn btn-success w-100" style="border-radius:50px;">
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
  </div>
</div>
